name: PR CI Pipeline

on:
  pull_request:
    branches:
      - develop
    paths-ignore:
      - '**.md'
      - 'docs/**'
      
permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  build-and-test:
    name: Build, Test & Validate
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - dotnet-version: '8.0.x'
            test-framework: 'net8.0'
          - dotnet-version: '9.0.x'
            test-framework: 'net9.0'
          - dotnet-version: '10.0.x'
            test-framework: 'net10.0'
      fail-fast: false

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET ${{ matrix.dotnet-version }}
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ matrix.dotnet-version }}

    - name: Restore dependencies
      run: |
        dotnet restore HappyCLI/HappyCLI.csproj
        dotnet restore HappyCLI.Tests/HappyCLI.Tests.csproj
      continue-on-error: false

    - name: Build projects
      run: |
        dotnet build HappyCLI/HappyCLI.csproj --configuration Release --no-restore
        dotnet build HappyCLI.Tests/HappyCLI.Tests.csproj --configuration Release --no-restore
      continue-on-error: false

    - name: Run tests with coverage
      run: |
        dotnet test HappyCLI.Tests/HappyCLI.Tests.csproj \
          --configuration Release \
          --no-build \
          --verbosity normal \
          --framework ${{ matrix.test-framework }} \
          --collect:"XPlat Code Coverage" \
          --results-directory ./coverage \
          --logger "trx;LogFileName=test-results-${{ matrix.dotnet-version }}.trx"

    - name: Prepare versioned coverage report
      run: |
        # --framework above ensures exactly one coverage file per run
        COVERAGE_FILE=$(find ./coverage -name "coverage.cobertura.xml" | head -1)
        if [ -z "$COVERAGE_FILE" ]; then
          echo "Error: No coverage.cobertura.xml file found" >&2
          exit 1
        fi
        mkdir -p ./coverage-versioned
        cp "$COVERAGE_FILE" ./coverage-versioned/coverage.cobertura.xml
        # Append " (TFM)" to every <package name="..."> so the report rows are clearly labelled per target framework
        sed -i "s/<package name=\"\([^\"]*\)\"/<package name=\"\1 (${{ matrix.test-framework }})\"/g" ./coverage-versioned/coverage.cobertura.xml

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-${{ matrix.dotnet-version }}
        path: ./coverage/**/*.trx
        retention-days: 30

    - name: Upload coverage reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-${{ matrix.dotnet-version }}
        path: ./coverage-versioned/coverage.cobertura.xml
        retention-days: 30

    # Package Validation (only for .NET 10 to avoid redundancy)
    - name: Validate package
      if: matrix.dotnet-version == '10.0.x'
      run: |
        dotnet pack HappyCLI/HappyCLI.csproj \
          --configuration Release \
          --no-build \
          --output ./packages \
          --verbosity normal

    - name: Upload package artifact
      if: matrix.dotnet-version == '10.0.x'
      uses: actions/upload-artifact@v4
      with:
        name: nuget-package
        path: ./packages/*.nupkg
        retention-days: 7

  coverage-report:
    name: Generate Coverage Report
    runs-on: ubuntu-latest
    needs: build-and-test
    if: needs.build-and-test.result == 'success'

    steps:
    - name: Download coverage artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: coverage-*
        path: ./coverage-reports

    - name: Generate coverage summary
      uses: irongut/CodeCoverageSummary@v1.3.0
      with:
        filename: ./coverage-reports/**/coverage.cobertura.xml
        format: markdown
        output: both
        fail_below_min: true
        thresholds: '60 80'

    - name: Add coverage comment to PR
      uses: marocchino/sticky-pull-request-comment@v2
      if: github.event_name == 'pull_request'
      with:
        recreate: true
        path: code-coverage-results.md

    - name: Upload coverage summary
      uses: actions/upload-artifact@v4
      with:
        name: coverage-summary
        path: code-coverage-results.md
        retention-days: 30

  test-results-report:
    name: Test Results Report
    runs-on: ubuntu-latest
    needs: build-and-test
    if: always()

    steps:
    - name: Download all test results
      uses: actions/download-artifact@v4
      with:
        pattern: test-results-*
        path: ./test-results
        merge-multiple: true

    - name: Publish test results
      uses: EnricoMi/publish-unit-test-result-action@v2
      with:
        files: ./test-results/**/*.trx
        comment_title: '🧪 Test Results'
        check_name: Test Results
        report_individual_runs: true
        fail_on: nothing
